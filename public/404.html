<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // GitHub Pages SPA fix
      // Redirige rutas como /talks o /article/rpki-ghost al index.html
      // conservando la ruta en el query string para que React Router la procese
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      var redirect = '/?p=' + encodeURIComponent(path) + (search ? '&q=' + encodeURIComponent(search.slice(1)) : '') + hash;
      window.location.replace(redirect);
    </script>
  </head>
  <body></body>
</html>
