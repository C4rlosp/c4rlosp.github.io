<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#080c10" />
    <meta name="description" content="Portfolio - Ingeniero en Redes" />
    <link rel="icon" href="/favicon.svg" />
    <title>Carlos Pérez | Network Engineer</title>
    <script>
      // GitHub Pages SPA fix - procesa el redirect del 404.html
      (function() {
        var redirect = window.location.search.slice(1);
        if (redirect.startsWith('p=')) {
          var params = {};
          redirect.split('&').forEach(function(p) {
            var kv = p.split('=');
            params[kv[0]] = decodeURIComponent(kv[1] || '');
          });
          var path = params['p'] || '/';
          var query = params['q'] ? '?' + params['q'] : '';
          window.history.replaceState(null, null, path + query);
        }
      })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
